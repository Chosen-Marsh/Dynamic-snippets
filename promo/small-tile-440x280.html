<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Dynamic Snippets – Small Tile 440×280</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 440px;
    height: 280px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #080d14;
  }
  .canvas {
    width: 440px;
    height: 280px;
    position: relative;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #080d14 0%, #0d1520 30%, #0f1a2e 60%, #0a1222 100%);
  }
  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34, 197, 94, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 197, 94, 0.03) 1px, transparent 1px);
    background-size: 30px 30px;
    z-index: 0;
  }
  .glow-1 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.1) 0%, transparent 70%);
    top: -80px;
    left: -60px;
  }
  .glow-2 {
    position: absolute;
    width: 250px;
    height: 250px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.05) 0%, transparent 70%);
    bottom: -80px;
    right: -40px;
  }
  .content {
    position: relative;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    gap: 10px;
  }
  .logo {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    overflow: hidden;
    box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  }
  .logo img {
    width: 100%;
    height: 100%;
  }
  .brand {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4ade80;
    margin-top: 4px;
  }
  h1 {
    font-size: 26px;
    font-weight: 800;
    line-height: 1.15;
    color: #f0fdf4;
  }
  h1 .accent {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .subtitle {
    font-size: 12px;
    color: #94a3b8;
    max-width: 340px;
  }
  .bar {
    width: 60px;
    height: 3px;
    border-radius: 2px;
    background: linear-gradient(90deg, #4ade80, #22c55e);
    opacity: 0.6;
    margin-top: 4px;
  }
</style>
</head>

<button id="dl-btn" onclick="doExport()" style="position:fixed;top:12px;right:12px;z-index:9999;background:#22c55e;color:#fff;border:none;padding:10px 22px;border-radius:8px;font-weight:700;font-size:14px;cursor:pointer;font-family:Inter,Segoe UI,system-ui,sans-serif;box-shadow:0 4px 16px rgba(0,0,0,.5)">Download PNG</button>
<script src="html2canvas.min.js"></script>
<script>
async function doExport() {
  var btn = document.getElementById('dl-btn');
  btn.textContent = 'Rendering...';
  btn.disabled = true;
  try {
    var canvas = await html2canvas(document.querySelector('.canvas'), {
      width: 440, height: 280, scale: 2,
      backgroundColor: '#080d14', logging: false
    });
    var a = document.createElement('a');
    a.href = canvas.toDataURL('image/png');
    a.download = 'small-tile-440x280.png';
    a.click();
    btn.textContent = 'Done!';
  } catch(e) { btn.textContent = 'Error: ' + e.message; console.error(e); }
  setTimeout(function(){ btn.textContent = 'Download PNG'; btn.disabled = false; }, 2000);
}
</script>
