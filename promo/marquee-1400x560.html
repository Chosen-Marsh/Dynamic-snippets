<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dynamic Snippets – Marquee Promo</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1400px;
    height: 560px;
    overflow: hidden;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: #080d14;
  }

  .canvas {
    width: 1400px;
    height: 560px;
    position: relative;
    overflow: hidden;
    display: flex;
    align-items: center;
    background: linear-gradient(135deg, #080d14 0%, #0d1520 30%, #0f1a2e 60%, #0a1222 100%);
  }

  /* Subtle grid pattern */
  .canvas::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(34, 197, 94, 0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(34, 197, 94, 0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    z-index: 0;
  }

  /* Glow orbs */
  .glow-1 {
    position: absolute;
    width: 500px;
    height: 500px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(34, 197, 94, 0.12) 0%, transparent 70%);
    top: -100px;
    left: -100px;
    z-index: 0;
  }

  .glow-2 {
    position: absolute;
    width: 600px;
    height: 600px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(74, 222, 128, 0.06) 0%, transparent 70%);
    bottom: -200px;
    right: 100px;
    z-index: 0;
  }

  .glow-3 {
    position: absolute;
    width: 300px;
    height: 300px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(251, 191, 36, 0.06) 0%, transparent 70%);
    top: 50px;
    right: 300px;
    z-index: 0;
  }

  /* Left content */
  .left {
    flex: 0 0 520px;
    padding: 60px 60px 60px 80px;
    z-index: 2;
    display: flex;
    flex-direction: column;
    justify-content: center;
  }

  .logo-row {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 28px;
  }

  .logo-icon {
    width: 52px;
    height: 52px;
    border-radius: 12px;
    overflow: hidden;
    flex-shrink: 0;
  }

  .logo-icon img {
    width: 100%;
    height: 100%;
  }

  .logo-text {
    font-size: 14px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #4ade80;
  }

  h1 {
    font-size: 44px;
    font-weight: 800;
    line-height: 1.1;
    color: #f0fdf4;
    margin-bottom: 18px;
  }

  h1 .accent {
    background: linear-gradient(135deg, #4ade80, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .subtitle {
    font-size: 17px;
    line-height: 1.6;
    color: #94a3b8;
    max-width: 420px;
    margin-bottom: 32px;
  }

  .features {
    display: flex;
    gap: 24px;
  }

  .feature-tag {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 500;
    color: #cbd5e1;
    background: rgba(34, 197, 94, 0.08);
    border: 1px solid rgba(34, 197, 94, 0.15);
    padding: 8px 14px;
    border-radius: 8px;
  }

  .feature-tag .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #22c55e;
    flex-shrink: 0;
  }

  /* Right screenshots area */
  .right {
    flex: 1;
    position: relative;
    z-index: 1;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .screenshots {
    position: relative;
    width: 800px;
    height: 480px;
  }

  .screenshot {
    position: absolute;
    border-radius: 12px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(34, 197, 94, 0.1),
      0 25px 50px rgba(0, 0, 0, 0.5),
      0 0 40px rgba(34, 197, 94, 0.05);
  }

  .screenshot img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .screenshot-1 {
    width: 460px;
    top: 20px;
    left: 0;
    z-index: 3;
    transform: perspective(1000px) rotateY(-2deg);
  }

  .screenshot-2 {
    width: 400px;
    top: 60px;
    left: 300px;
    z-index: 2;
    transform: perspective(1000px) rotateY(-3deg);
  }

  .screenshot-3 {
    width: 320px;
    top: 140px;
    left: 520px;
    z-index: 1;
    opacity: 0.7;
    transform: perspective(1000px) rotateY(-4deg);
  }

  /* Floating code snippet decoration */
  .floating-snippet {
    position: absolute;
    background: rgba(13, 21, 32, 0.95);
    border: 1px solid rgba(34, 197, 94, 0.2);
    border-radius: 8px;
    padding: 10px 16px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    color: #4ade80;
    z-index: 10;
    backdrop-filter: blur(8px);
    box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
  }

  .floating-1 {
    bottom: 40px;
    left: 20px;
  }

  .screenshot-4 {
    width: 280px;
    top: 10px;
    left: 540px;
    z-index: 4;
    transform: perspective(1000px) rotateY(-2deg) scale(0.85);
    opacity: 0.85;
  }

  .floating-2 {
    top: 10px;
    right: 50px;
  }

  .var-highlight {
    color: #fbbf24;
  }
</style>
</head>
